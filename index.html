<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Habit Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="app">
  <div class="main">
    <div class="header">
      <h1>Habit Streak</h1>
      <div class="date-strip">
      </div>
    </div>

    <div class="habit-list">
    </div>
  </div>

  <div class="insights">
    <h2>Insights</h2>
    <div class="card heatmap">
      <p>Activity</p>
      <div class="grid">
      </div>
    </div>

    <div class="card chart">
      <p>Weekly Progress</p>
      <div class="bars">
      </div>
    </div>

    <div class="card top-habits">
    </div>
  </div>
</div>

<div class="modal">
</div>

</body>
<script type="module" src="home.js"></script>
</html>
