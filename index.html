<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Habit Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="app">
  <div class="main">
    <div class="header">
      <h1>Habit Streak</h1>
      <div class="date-strip">
      </div>
    </div>

    <div class="habit-list">
    </div>
  </div>

  <div class="insights">
    <h2>Insights</h2>
    <div class="card heatmap">
      <p>Activity</p>
      <div class="grid">
      </div>
    </div>

    <div class="card chart">
      <p>Weekly Progress</p>
      <div class="bars">
      </div>
    </div>

    <div class="card top-habits">
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal hidden">
  <div class="modal-content">

    <h2>🏋️ Gym Workout</h2>

    <!-- STREAK -->
    <div class="stats">
        <div>
        <p>Current</p>
        <h3>37 🔥</h3>
        </div>
        <div>
        <p>Best</p>
        <h3>37 🔥</h3>
        </div>
    </div>

    <!-- TOTAL -->
    <div class="info-card">
        <p>Total Completions</p>
        <h3>132</h3>
    </div>

    <!-- HEATMAP -->
    <div class="heatmap-large">
        <!-- You can generate via JS later -->
    </div>

    <!-- EXTRA DETAILS -->
    <div class="details">
        <div>
        <p>Completion Rate</p>
        <span>73%</span>
        </div>
        <div>
        <p>Frequency</p>
        <span>Daily</span>
        </div>
        <div>
        <p>Created On</p>
        <span>July 30, 2025</span>
        </div>
    </div>

    <button class="close-btn">Close</button>
  </div>
</div>
</body>
<script type="module" src="home.js"></script>
</html>
